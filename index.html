<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love Journey</title>

<style>

body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.screen{
display:none;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:#ff1e4d;
}

h1{
font-size:40px;
}

.heart{
position:fixed;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>

</head>

<body>

<audio id="music" src="music.mp3"></audio>

<!-- Welcome Screen -->
<div id="screen1" class="screen" style="display:block;">
<h1>Welcome Rena ❤️</h1>
<p>This little game is about us.</p>
<button onclick="startGame()">Start Our Love Journey</button>
</div>

<!-- Question Screen -->
<div id="screen2" class="screen">
<h1>Question 💭</h1>
<p>What makes me happiest?</p>

<button onclick="answer()">Your smile</button>
<button onclick="answer()">Your voice</button>
<button onclick="answer()">Being with you</button>

</div>

<!-- Compliment Screen -->
<div id="screen3" class="screen">
<h1>A message for you 💌</h1>
<p id="compliment"></p>

<button onclick="nextGame()">Next</button>
</div>

<!-- Heart Game -->
<div id="screen4" class="screen">
<h1>Find the Love ❤️</h1>
<p>Click the heart!</p>

<button onclick="final()">❤️</button>
</div>

<!-- Final Screen -->
<div id="screen5" class="screen">
<h1>My Final Message</h1>

<p style="font-size:22px;max-width:500px">
Rena…  
In this big world,  
my heart found its home in you.  

This game is small,  
but my love for you is endless. ❤️
</p>

</div>

<script>

function startGame(){

document.getElementById("music").play();

document.getElementById("screen1").style.display="none";
document.getElementById("screen2").style.display="block";

}

function answer(){

document.getElementById("screen2").style.display="none";
document.getElementById("screen3").style.display="block";

let messages = [

"Your smile is my favorite place.",
"You are the best part of my life.",
"My heart feels peace when I'm with you.",
"You are my dream come true.",
"You are my home."

];

let random = Math.floor(Math.random()*messages.length);

document.getElementById("compliment").innerText = messages[random];

}

function nextGame(){

document.getElementById("screen3").style.display="none";
document.getElementById("screen4").style.display="block";

}

function final(){

document.getElementById("screen4").style.display="none";
document.getElementById("screen5").style.display="block";

}

function createHeart(){

let heart=document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
